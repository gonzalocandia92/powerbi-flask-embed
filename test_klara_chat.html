<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test KLARA Chat UI</title>
<style>
  :root {
    --sudata-green: #4CAF50; --sudata-text: #1a1a2e;
    --sudata-muted: #6b7280; --sudata-border: #e5e7eb;
  }
  * { box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f3f4f6; margin: 0; padding: 20px; }

  h1 { font-size: 18px; margin-bottom: 16px; color: var(--sudata-text); }

  /* ── Controls ── */
  .controls {
    display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px;
    padding: 14px; background: white; border-radius: 10px; border: 1px solid var(--sudata-border);
  }
  .controls label { font-size: 12px; font-weight: 600; color: var(--sudata-muted); display: block; margin-bottom: 4px; }
  .ctrl-group { display: flex; flex-direction: column; }
  button.ctrl {
    padding: 8px 14px; border: 1px solid var(--sudata-border); border-radius: 8px;
    background: white; cursor: pointer; font-size: 13px; font-weight: 600;
    color: var(--sudata-text); transition: background .15s;
  }
  button.ctrl:hover { background: #f0fdf4; border-color: var(--sudata-green); }
  button.ctrl.danger { border-color: #fca5a5; color: #dc2626; }
  button.ctrl.danger:hover { background: #fef2f2; }
  select.ctrl { padding: 8px 12px; border-radius: 8px; border: 1px solid var(--sudata-border); font-size: 13px; }

  /* ── Chat panel (same styles as report_base.html) ── */
  .klara-sidebar-panel {
    width: 400px; background: #f9fafb; border: 1px solid var(--sudata-border);
    border-radius: 14px; display: flex; flex-direction: column;
    height: 600px; overflow: hidden; box-shadow: 0 8px 32px rgba(0,0,0,.12);
  }
  .klara-sidebar-header {
    background: linear-gradient(135deg,#1b1f3b 0%,#2d3561 100%);
    color: white; padding: 14px 16px; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0;
  }
  .klara-title { display: flex; align-items: center; gap: 10px; }
  .klara-title h2 { margin: 0; font-size: 18px; letter-spacing: .05em; }
  .klara-title p { margin: 3px 0 0; font-size: 12px; opacity: .86; }
  .klara-avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--sudata-green); display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 16px; }
  .klara-sidebar-messages {
    flex: 1; overflow-y: auto; padding: 14px 12px;
    display: flex; flex-direction: column; gap: 6px;
  }
  .klara-msg { max-width: 84%; animation: klaraMsgIn .22s ease; }
  .klara-msg.user { align-self: flex-end; }
  .klara-msg.bot  { align-self: flex-start; }
  .klara-bubble {
    padding: 10px 14px; border-radius: 18px; font-size: 14px; line-height: 1.45; word-break: break-word;
  }
  .klara-msg.user .klara-bubble { background: var(--sudata-green); color: white; border-bottom-right-radius: 5px; }
  .klara-msg.bot  .klara-bubble { background: white; color: var(--sudata-text); border: 1px solid var(--sudata-border); border-bottom-left-radius: 5px; }

  /* Timestamp */
  .klara-msg-time {
    display: block; font-size: 10px; color: var(--sudata-muted);
    margin-top: 3px; line-height: 1;
  }
  .klara-msg.user .klara-msg-time { text-align: right; }
  .klara-msg.bot  .klara-msg-time { text-align: left; }

  /* Date separator */
  .klara-date-sep {
    text-align: center; font-size: 11px; color: var(--sudata-muted);
    margin: 10px 4px; display: flex; align-items: center; gap: 8px;
  }
  .klara-date-sep::before, .klara-date-sep::after {
    content: ''; flex: 1; height: 1px; background: var(--sudata-border);
  }

  /* Typing dots */
  .klara-typing {
    align-self: flex-start; padding: 12px 14px;
    border-radius: 16px; border-bottom-left-radius: 5px;
    background: white; border: 1px solid var(--sudata-border);
    display: flex; gap: 5px;
  }
  .klara-typing span {
    width: 7px; height: 7px; border-radius: 50%; background: var(--sudata-green);
    animation: klaraTyping 1.2s infinite ease-in-out;
  }
  .klara-typing span:nth-child(2) { animation-delay: .16s; }
  .klara-typing span:nth-child(3) { animation-delay: .32s; }

  /* Thinking text */
  .klara-thinking-text {
    align-self: flex-start; max-width: 84%;
    padding: 9px 14px; border-radius: 16px; border-bottom-left-radius: 5px;
    background: white; border: 1px solid var(--sudata-border);
    font-size: 13px; color: var(--sudata-muted); font-style: italic;
    animation: klaraMsgIn .22s ease;
  }

  /* Input */
  .klara-sidebar-input { padding: 12px; border-top: 1px solid var(--sudata-border); background: white; flex-shrink: 0; }
  #klara-sidebar-form { display: flex; gap: 8px; align-items: flex-end; }
  #klara-sidebar-text {
    flex: 1; min-height: 42px; max-height: 110px; padding: 11px 13px;
    border: 1px solid #d1d5db; border-radius: 16px; resize: none; outline: none;
    font-family: inherit; font-size: 14px;
  }
  #klara-sidebar-text:focus { border-color: var(--sudata-green); box-shadow: 0 0 0 3px rgba(76,175,80,.14); }
  #klara-sidebar-send {
    width: 42px; height: 42px; border: none; border-radius: 50%;
    background: var(--sudata-green); color: white; cursor: pointer; font-size: 18px; flex-shrink: 0;
  }
  #klara-sidebar-send:hover { background: #43a047; }
  #klara-sidebar-send:disabled { background: #9ca3af; cursor: not-allowed; }
  .klara-counter { margin-top: 6px; color: var(--sudata-muted); display: flex; justify-content: space-between; font-size: 11px; }

  /* Status box */
  .status-box {
    margin-top: 16px; padding: 10px 14px; background: white;
    border: 1px solid var(--sudata-border); border-radius: 8px; font-size: 12px;
    color: var(--sudata-muted); max-width: 400px;
  }
  .status-box strong { color: var(--sudata-text); }

  @keyframes klaraMsgIn { from { opacity: 0; transform: translateY(7px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes klaraTyping {
    0%, 80%, 100% { opacity: .35; transform: translateY(0); }
    40% { opacity: 1; transform: translateY(-3px); }
  }
</style>
</head>
<body>

<h1>🧪 Test KLARA Chat UI — Fechas, horas y mensajes progresivos</h1>

<div class="controls">
  <div class="ctrl-group">
    <label>Respuesta simulada</label>
    <select class="ctrl" id="delay-select">
      <option value="1500">Rápida (1.5s) — solo dots</option>
      <option value="5000">Media (5s) — "Estoy analizando..."</option>
      <option value="12000" selected>Lenta (12s) — "Preparando respuesta..."</option>
      <option value="22000">Muy lenta (22s) — "Ya casi está..."</option>
    </select>
  </div>
  <div class="ctrl-group">
    <label>Mensajes históricos</label>
    <button class="ctrl" onclick="loadOldMessages()">📅 Cargar mensajes de días anteriores</button>
  </div>
  <div class="ctrl-group">
    <label>Limpiar</label>
    <button class="ctrl danger" onclick="clearChat()">🗑 Limpiar chat</button>
  </div>
</div>

<!-- The actual chat panel -->
<div class="klara-sidebar-panel">
  <header class="klara-sidebar-header">
    <div class="klara-title">
      <div class="klara-avatar">K</div>
      <div>
        <h2>KLARA</h2>
        <p>Asistente Analítico Sudata</p>
      </div>
    </div>
  </header>
  <section id="klara-sidebar-messages" class="klara-sidebar-messages"></section>
  <footer class="klara-sidebar-input">
    <form id="klara-sidebar-form">
      <textarea id="klara-sidebar-text" placeholder="Preguntá sobre tus datos..." maxlength="500" rows="1"></textarea>
      <button id="klara-sidebar-send" type="submit">➜</button>
    </form>
    <div class="klara-counter">
      <span>KLARA · Test mode (sin backend)</span>
      <span id="klara-sidebar-counter">0/500</span>
    </div>
  </footer>
</div>

<div class="status-box" id="status-box">
  <strong>Estado:</strong> listo. Escribí un mensaje y fijate los mensajes progresivos según el delay seleccionado.
</div>

<script>
(function () {
  var messages  = document.getElementById("klara-sidebar-messages");
  var form      = document.getElementById("klara-sidebar-form");
  var input     = document.getElementById("klara-sidebar-text");
  var sendBtn   = document.getElementById("klara-sidebar-send");
  var counter   = document.getElementById("klara-sidebar-counter");
  var statusBox = document.getElementById("status-box");

  var isTyping = false, lastMsgDate = null, _thinkingEl = null, _thinkingTimers = [];

  /* ── Date/time helpers (same logic as report_base.html) ── */
  function _fmt2(n) { return String(n).padStart(2, '0'); }

  function formatTime(date) {
    return _fmt2(date.getHours()) + ':' + _fmt2(date.getMinutes());
  }

  function formatDateSep(date) {
    var now = new Date();
    var diffDays = Math.floor((now - date) / 86400000);
    if (diffDays < 7) {
      var days = ['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];
      return days[date.getDay()];
    }
    return _fmt2(date.getDate()) + '/' + _fmt2(date.getMonth() + 1) + '/' + date.getFullYear();
  }

  function isSameDay(d1, d2) {
    return d1.getFullYear() === d2.getFullYear() &&
           d1.getMonth()    === d2.getMonth()    &&
           d1.getDate()     === d2.getDate();
  }

  function insertDateSep(date) {
    var sep = document.createElement('div');
    sep.className = 'klara-date-sep';
    sep.textContent = formatDateSep(date);
    messages.appendChild(sep);
  }

  function sanitize(text) {
    var d = document.createElement("div");
    d.textContent = text || "";
    return d.innerHTML;
  }

  /* addMessage with optional forced date (for historical simulation) */
  function addMessage(type, text, forcedDate) {
    var now = forcedDate || new Date();
    if (!lastMsgDate || !isSameDay(lastMsgDate, now)) {
      insertDateSep(now);
    }
    lastMsgDate = now;

    var wrapper = document.createElement("div");
    var bubble  = document.createElement("div");
    var time    = document.createElement("span");
    wrapper.className = "klara-msg " + type;
    bubble.className  = "klara-bubble";
    bubble.innerHTML  = sanitize(text).replace(/\n/g, "<br>");
    time.className    = "klara-msg-time";
    time.textContent  = formatTime(now);
    wrapper.appendChild(bubble);
    wrapper.appendChild(time);
    messages.appendChild(wrapper);
    messages.scrollTop = messages.scrollHeight;
  }

  var _thinkingSteps = [
    { delay: 3000,  text: "Estoy analizando los datos..." },
    { delay: 8000,  text: "Ahora estoy preparando la respuesta..." },
    { delay: 16000, text: "Ya casi está..." }
  ];

  function showThinking() {
    isTyping = true; sendBtn.disabled = true;
    var el = document.createElement("div");
    el.id = "klara-sidebar-typing"; el.className = "klara-typing";
    el.innerHTML = "<span></span><span></span><span></span>";
    messages.appendChild(el);
    messages.scrollTop = messages.scrollHeight;
    _thinkingEl = el;

    var stepLog = [];
    _thinkingSteps.forEach(function(step) {
      var t = setTimeout(function() {
        if (!_thinkingEl) return;
        _thinkingEl.className = "klara-thinking-text";
        _thinkingEl.textContent = step.text;
        messages.scrollTop = messages.scrollHeight;
        stepLog.push(step.text);
        setStatus("Mostrando: \"" + step.text + "\"");
      }, step.delay);
      _thinkingTimers.push(t);
    });

    setStatus("Pensando... (dots activos)");
  }

  function hideThinking() {
    isTyping = false; sendBtn.disabled = false;
    _thinkingTimers.forEach(clearTimeout);
    _thinkingTimers = [];
    if (_thinkingEl) { _thinkingEl.remove(); _thinkingEl = null; }
  }

  function setStatus(msg) {
    statusBox.innerHTML = "<strong>Estado:</strong> " + msg;
  }

  /* Fake responses for test */
  var fakeAnswers = [
    "Las ventas de febrero fueron $3.240.967 en total, un 12% más que enero.",
    "El producto más vendido fue 'Combo Familiar' con 847 unidades.",
    "Las medidas disponibles incluyen: Ventas ARS, Ventas USD, Margen Bruto y Unidades Vendidas.",
    "Para el rango seleccionado, el ticket promedio fue de $8.420.",
    "No encontré datos suficientes para ese período. Probá con otro rango de fechas."
  ];

  async function sendQuestion(pregunta) {
    pregunta = (pregunta || input.value).trim();
    if (!pregunta || isTyping) return;

    addMessage("user", pregunta);
    input.value = ""; input.style.height = "auto";
    counter.textContent = "0/500";

    var delayMs = parseInt(document.getElementById("delay-select").value);
    showThinking();

    // Simulate backend delay
    await new Promise(function(resolve) { setTimeout(resolve, delayMs); });

    hideThinking();
    var answer = fakeAnswers[Math.floor(Math.random() * fakeAnswers.length)];
    addMessage("bot", answer);
    setStatus("Respuesta entregada tras " + (delayMs/1000) + "s de espera.");
  }

  /* Load historical messages across different dates */
  window.loadOldMessages = function() {
    // Reset chat so historical messages load in correct chronological order
    messages.innerHTML = "";
    lastMsgDate = null;
    hideThinking();

    var now = new Date();
    var makeDate = function(daysAgo, h, m) {
      var d = new Date(now);
      d.setDate(d.getDate() - daysAgo);
      d.setHours(h, m, 0, 0);
      return d;
    };

    // Messages from 10 days ago (should show DD/MM/AAAA)
    addMessage("user", "Hola, ¿qué datos tenés disponibles?", makeDate(10, 9, 15));
    addMessage("bot",  "Hola, tengo disponibles datos de ventas, productos y sucursales.", makeDate(10, 9, 16));

    // Messages from 3 days ago (should show day name)
    addMessage("user", "¿Cuánto vendimos en febrero?", makeDate(3, 11, 50));
    addMessage("bot",  "En febrero las ventas fueron $3.624.096. Un buen mes.", makeDate(3, 11, 51));

    // Messages from yesterday
    addMessage("user", "Dame las medidas que quedan disponibles.", makeDate(1, 17, 22));
    addMessage("bot",  "Estas son las medidas que quedan disponibles: Ventas ARS, Ventas USD, Margen.", makeDate(1, 20, 27));

    // Message from today
    addMessage("bot",  "¡Bienvenido de nuevo! ¿En qué te ayudo hoy?");

    setStatus("Mensajes históricos cargados. Fijate los separadores de fecha.");
    messages.scrollTop = messages.scrollHeight;
  };

  window.clearChat = function() {
    messages.innerHTML = "";
    lastMsgDate = null;
    hideThinking();
    addMessage("bot", "Hola, soy KLARA. Puedo ayudarte a consultar ventas, productos y métricas del tablero sin escribir código.");
    setStatus("Chat reiniciado.");
  };

  /* Event listeners */
  form.addEventListener("submit", function(e) { e.preventDefault(); sendQuestion(); });
  input.addEventListener("input", function() {
    counter.textContent = input.value.length + "/500";
    input.style.height = "auto";
    input.style.height = Math.min(input.scrollHeight, 110) + "px";
  });
  input.addEventListener("keydown", function(e) {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendQuestion(); }
  });

  /* Init */
  addMessage("bot", "Hola, soy KLARA. Puedo ayudarte a consultar ventas, productos y métricas del tablero sin escribir código.");
})();
</script>
</body>
</html>
